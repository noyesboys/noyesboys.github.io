<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Line 1 Master - Noyes Boys</title>
    <link rel="icon" type="image/x-icon" href="assets/img/noyes boys logo.png" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --neon-green: #4ade80;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --carbon-dark: #0a0a0a;
        }

        body {
            background-color: var(--carbon-dark);
            background-image: linear-gradient(45deg, #111 25%, transparent 25%), linear-gradient(-45deg, #111 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #111 75%), linear-gradient(-45deg, transparent 75%, #111 75%);
            background-size: 10px 10px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
        }

        header.masthead {
            height: 35vh;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), var(--carbon-dark)), url('assets/img/bg-masthead.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-bottom: 3px solid var(--neon-green);
        }

        .filter-nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px;
            display: flex; justify-content: center; gap: 10px;
            border-bottom: 1px solid var(--glass-border);
        }

        .filter-btn {
            background: transparent; color: var(--neon-green); border: 1px solid var(--neon-green);
            padding: 8px 18px; font-weight: 800; cursor: pointer; border-radius: 4px;
        }

        .filter-btn.active { background: var(--neon-green); color: #000; }

        .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }
        .strain-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 30px; }

        /* --- Card Logic --- */
        .strain-card { perspective: 1500px; height: 820px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .strain-card.is-flipped .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 15px; background: var(--glass-bg); backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); display: flex; flex-direction: column; overflow: hidden;
        }
        .card-back { transform: rotateY(180deg); }

        /* --- Image & Terpenes --- */
        .img-click-zone { height: 260px; background: #000; position: relative; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .img-click-zone img.main-img { max-width: 80%; max-height: 80%; object-fit: contain; }
        
        .terpene-badge-wrap {
            position: absolute; bottom: 10px; right: 10px; display: flex; gap: 8px;
        }
        .terp-icon {
            background: rgba(0,0,0,0.7); border: 1px solid var(--neon-green);
            width: 35px; height: 35px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--neon-green); font-size: 0.9rem;
        }

        .card-body { padding: 25px; flex-grow: 1; display: flex; flex-direction: column; }
        .strain-title { color: var(--neon-green); font-size: 1.6rem; font-weight: 800; margin: 0; }
        .lineage { color: #888; font-style: italic; font-size: 0.85rem; margin-bottom: 12px; }
        .description { font-size: 0.9rem; color: #ccc; line-height: 1.5; margin-bottom: 20px; }

        .sash {
            position: absolute; top: 20px; right: -35px; background: #ff3e3e; color: white;
            padding: 5px 40px; transform: rotate(45deg); font-size: 0.6rem; font-weight: 900; z-index: 5;
        }

        .purchase-zone { margin-top: auto; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 10px; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-cart { flex: 2; background: var(--neon-green); color: #000; border: none; padding: 12px; font-weight: 800; cursor: pointer; border-radius: 4px; }
        .btn-more { flex: 1; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid var(--glass-border); padding: 12px; font-weight: 800; text-decoration: none; text-align: center; border-radius: 4px; font-size: 0.75rem; display: flex; align-items: center; justify-content: center; }
        
        select { width: 100%; background: #111; color: #fff; border: 1px solid var(--glass-border); padding: 10px; margin-bottom: 10px; border-radius: 4px; }
        .flip-hint { font-size: 0.7rem; color: var(--neon-green); text-align: center; margin-bottom: 15px; letter-spacing: 1px; text-transform: uppercase; }
    </style>
</head>
<body>

<header class="masthead">
    <img src="assets/img/noyes boys logo.png" style="max-width:140px;">
    <h1 style="font-size: 3rem; margin:0; letter-spacing: 2px;">LINE 1 MASTER</h1>
</header>

<nav class="filter-nav">
    <button class="filter-btn active" onclick="filterStrains('all', event)">[ ALL ]</button>
    <button class="filter-btn" onclick="filterStrains('sativa', event)">[ SATIVA ]</button>
    <button class="filter-btn" onclick="filterStrains('indica', event)">[ INDICA ]</button>
    <button class="filter-btn" onclick="filterStrains('hybrid', event)">[ HYBRID ]</button>
</nav>

<div class="container">
    <div class="strain-grid" id="mainGrid"></div>
</div>

<script>
    const strains = [
        { name: "Purple Rainbow", lineage: "Alien Tech × Rainbow Belts × Wedding Cake", type: "indica", desc: "A heavy-hitting indica with deep purple hues and a sweet candy finish. Provides a profound body relaxation perfect for evening use.", img: "assets/logos/new logos/purple rainbow.png", card: "purplerainbowscard.png", link: "purplerainbow", terps: ["fa-leaf", "fa-candy-cane"] },
        { name: "Rainbow Cakes", lineage: "Noyes Breath × Biscotti × Wedding Cake", type: "sativa", desc: "Uplifting and euphoric. This blend offers creamy cake notes balanced by sharp, sweet fruit profiles. Ideal for social and creative tasks.", img: "assets/logos/new logos/rainbow cakes.png", card: "rainbowcakescard.png", link: "rainbowcakes", terps: ["fa-lemon", "fa-birthday-cake"] },
        { name: "Cake Breath", lineage: "Wedding Cake × Meatbreath", type: "indica", desc: "Dense, resinous buds with a funky vanilla-fuel aroma. A powerful medicinal choice known for its heavy sedative properties.", img: "assets/logos/new logos/cake breath.png", card: "cakebreathcard.png", link: "cakebreath", terps: ["fa-wind", "fa-cloud"] },
        { name: "Alienoyes Kush", lineage: "Alien Tech × Noyes Kush", type: "indica", desc: "Out-of-this-world potency. Classic kush gas meets earthy pine. This is our signature breeder's cut for seasoned connoisseurs.", img: "assets/logos/new logos/alienoyes kush.png", card: "alienoyeskushcard.jpg", link: "alienoyes", terps: ["fa-tree", "fa-flask"] },
        { name: "Mangonoyes Kush", lineage: "Mango Kush × Noyes Kush", type: "hybrid", desc: "A tropical fruit explosion with a functional, balanced hybrid effect. Loud aroma with a very smooth, flavorful finish.", img: "assets/logos/new logos/mangonoyes kush.png", card: "mangonoyeskushcard.png", link: "mangonoyes", terps: ["fa-sun", "fa-apple-whole"] },
        { name: "Citronoyes Haze", lineage: "Noyes Haze × Lemon Haze × Noyes Kush", type: "sativa", desc: "Zesty lemon and sharp citrus notes dominate. A fast-flowering sativa that provides pure energy and mental clarity.", img: "assets/logos/new logos/citronoyes haze.png", card: "citronoyeshazecard.png", link: "citronoyes", terps: ["fa-bolt", "fa-lemon"] },
        { name: "Noyes Haze", lineage: "Noyes Kush × Lemon Haze", type: "sativa", desc: "The foundation of our sativa line. Features an incredibly pungent citrus smell and an uplifting, long-lasting head high.", img: "assets/blkbkg/noyeshaze.png", card: "noyeshazecard.png", link: "noyeshaze", terps: ["fa-mountain", "fa-bolt"] },
        { name: "Noyes Breath", lineage: "Noyes Kush × Meatbreath", type: "indica", desc: "Gassy, funky, and visually stunning. This strain represents the absolute peak of the modern 'breath' lineage genetics.", img: "assets/blkbkg/noyesbreath.png", card: "noyesbreathcard.jpg", link: "noyesbreath", terps: ["fa-skull", "fa-fire"] },
        { name: "Meat Cakes", lineage: "Meatbreath × Wedding Cake", type: "indica", desc: "A legendary pairing of savory funk and sweet frosting. Unique terpene profile that must be tasted to be believed.", img: "assets/blkbkg/meatcakes.png", card: "meatcakescard.png", link: "meatcakes", terps: ["fa-drumstick-bite", "fa-ice-cream"] },
        { name: "Biscotti Rocks", lineage: "Rainbow Belts × Biscotti × Meatbreath", type: "indica", desc: "Rock-hard, crystal-coated buds. Dessert-like aroma with a crushing finish that satisfied even the highest tolerances.", img: "assets/blkbkg/biscottirocks.png", card: "biscottirockscard.png", link: "biscottirocks", terps: ["fa-cookie", "fa-gem"] }
    ];

    function renderStrains() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = strains.map(s => `
            <div class="strain-card" data-type="${s.type}">
                <div class="card-inner">
                    <div class="card-front">
                        ${s.name.toLowerCase().includes('noyes') ? '<div class="sash">Breeder\'s Choice</div>' : ''}
                        <div class="img-click-zone" onclick="toggleFlip(this.closest('.strain-card'))">
                            <img src="${s.img}" class="main-img">
                            <div class="terpene-badge-wrap">
                                ${s.terps.map(icon => `<div class="terp-icon"><i class="fa-solid ${icon}"></i></div>`).join('')}
                            </div>
                        </div>
                        <div class="card-body">
                            <h3 class="strain-title">${s.name}</h3>
                            <span class="lineage">${s.lineage}</span>
                            <p class="description">${s.desc}</p>
                            <div class="flip-hint">* Click Image to Flip for Strain Card *</div>
                            <div class="purchase-zone">
                                <select id="qty-${s.name.replace(/\s+/g, '')}">
                                    <option value="1|20">1 Seed - $20</option>
                                    <option value="3|50">3 Seeds - $50</option>
                                    <option value="5|75">5 Seeds - $75</option>
                                    <option value="10|130">10 Seeds - $130</option>
                                </select>
                                <div class="btn-group">
                                    <button class="btn-cart" onclick="addToCart('${s.name}', 'qty-${s.name.replace(/\s+/g, '')}', '${s.img}')">Add to Cart</button>
                                    <a href="https://noyesboys.com/${s.link}" class="btn-more">Read More</a>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="card-back" onclick="toggleFlip(this.closest('.strain-card'))">
                        <img src="assets/sept22edits/websiteimagedata/cards/finished/${s.card}" style="width:100%; height:100%; object-fit:cover;">
                    </div>
                </div>
            </div>
        `).join('');
    }

    function toggleFlip(card) { card.classList.toggle('is-flipped'); }

    function filterStrains(type, e) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        document.querySelectorAll('.strain-card').forEach(card => {
            card.style.display = (type === 'all' || card.dataset.type === type) ? 'block' : 'none';
        });
    }

    function addToCart(name, selectId, imgPath) {
        const select = document.getElementById(selectId);
        const [seeds, price] = select.value.split('|');
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        cart.push({ id: Date.now() + Math.random(), name: name, packSize: seeds + " Seeds", price: parseFloat(price), qty: 1, img: imgPath });
        localStorage.setItem('cart', JSON.stringify(cart));
        alert(`${name} added to cart!`);
    }

    renderStrains();
</script>
</body>
</html>
