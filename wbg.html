<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noyes Boys: The Farm - Cinematic 3D</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<!-- Three.js Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
<style>
  :root {
    --green: #4ade80; --green-dark: #052e16; --carbon: #020302; 
    --gold: #fbbf24; --neon: #22d3ee;
    --glass: rgba(0, 8, 0, 0.85); --glass-border: rgba(74, 222, 128, 0.1);
  }
  body, html { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; height: 100vh; }
  
  canvas#stage { display: block; position: fixed; top: 0; left: 0; filter: contrast(1.1) brightness(0.9); }

  /* OVERHEAD HUD: BLUEPRINT STYLE */
  #top-bar {
    position: absolute; top: 0; left: 0; right: 0; height: 35px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; pointer-events: auto; z-index: 100;
    border-bottom: 1px solid var(--glass-border);
  }
  .hud-item { display: flex; align-items: baseline; gap: 8px; }
  .hud-lbl { color: var(--green); font-size: 7px; letter-spacing: 2px; font-weight: 700; opacity: 0.6; }
  .hud-val { color: #fff; font-size: 13px; font-family: 'Orbitron'; letter-spacing: 1px; }

  /* CLIMATE CONTROL: GLASSMORPHISM */
  #climate-dock {
    position: absolute; bottom: 25px; right: 25px; width: 240px;
    background: var(--glass); border: 1px solid var(--glass-border);
    padding: 15px; pointer-events: auto; border-radius: 2px;
    backdrop-filter: blur(20px); z-index: 100;
    box-shadow: 0 20px 50px rgba(0,0,0,0.8);
  }
  .dock-header { display: flex; justify-content: space-between; align-items: flex-start; cursor: pointer; }
  .dock-content { height: 0; opacity: 0; overflow: hidden; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
  #climate-dock.expanded .dock-content { height: 160px; opacity: 1; margin-top: 15px; border-top: 1px solid var(--glass-border); padding-top: 15px; }
  
  .slider-group { margin-bottom: 15px; }
  .slider-label { font-size: 8px; color: var(--green); display: flex; justify-content: space-between; margin-bottom: 6px; font-family: 'Orbitron'; letter-spacing: 1px; }
  input[type=range] { width: 100%; accent-color: var(--green); background: #111; height: 1px; outline: none; -webkit-appearance: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%; background: var(--green); cursor: pointer; box-shadow: 0 0 10px rgba(74, 222, 128, 0.5); }

  /* TERMINAL MODAL */
  #tablet {
    display: none; position: absolute; inset: 15%; background: rgba(2, 5, 2, 0.98); 
    border: 1px solid var(--green-dark); pointer-events: auto; z-index: 200;
    flex-direction: column; border-radius: 2px; backdrop-filter: blur(15px);
  }
  .tablet-header { padding: 15px 25px; border-bottom: 1px solid var(--green-dark); display: flex; justify-content: space-between; font-family: 'Orbitron'; font-size: 10px; color: var(--green); letter-spacing: 2px; }
  .tablet-body { flex: 1; display: flex; }
  .tablet-nav { width: 180px; border-right: 1px solid var(--green-dark); padding: 20px; display: flex; flex-direction: column; gap: 10px; }
  .tablet-content { flex: 1; padding: 40px; font-family: 'Share Tech Mono'; color: #888; overflow-y: auto; font-size: 14px; }
  
  .nav-btn { background: transparent; border: none; color: #444; padding: 12px; cursor: pointer; text-align: left; font-size: 10px; font-family: 'Orbitron'; transition: 0.3s; border-left: 2px solid transparent; }
  .nav-btn:hover, .nav-btn.active { color: var(--green); border-left: 2px solid var(--green); background: rgba(74, 222, 128, 0.03); }

  .hint { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); font-family: 'Orbitron'; font-size: 9px; color: #fff; letter-spacing: 2px; padding: 10px 25px; background: rgba(0,0,0,0.9); border: 1px solid #333; }
  
  /* Loading Overlay */
  #loader { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; color: var(--green); font-size: 12px; letter-spacing: 5px; }
</style>
</head>
<body>

<div id="loader">INITIALIZING_PHOTON_ENGINE...</div>

<div id="game-ui">
  <div id="top-bar">
    <div class="hud-item">
      <span class="hud-lbl">NODE:</span><span class="hud-val" style="color:var(--green)">FACILITY_01</span>
    </div>
    <div class="hud-item" style="gap:30px">
      <div class="hud-item"><span class="hud-lbl">CREDITS</span><span id="ui-coins" class="hud-val">1,500.00</span></div>
      <div class="hud-item"><span class="hud-lbl">TOTAL_G</span><span id="ui-total-g" class="hud-val">124.5</span></div>
    </div>
    <div class="hud-item">
      <span class="hud-lbl">LINK:</span><span style="color:var(--green); font-size:10px;">ENCRYPTED</span>
    </div>
  </div>

  <div id="climate-dock">
    <div class="dock-header" onclick="this.parentElement.classList.toggle('expanded')">
      <div>
        <div style="font-size:7px; font-family:'Orbitron'; color:var(--green); letter-spacing:1px; margin-bottom:4px;">ATMOSPHERIC_TELEMETRY</div>
        <div id="dock-summary" style="font-size:20px; color:#fff; font-weight:300; font-family:'Rajdhani';">74.2°F / 55%</div>
      </div>
      <div id="ui-vpd" style="font-family:'Share Tech Mono'; font-size:12px; color:var(--green); border:1px solid var(--green-dark); padding:4px 8px;">1.12 kPa</div>
    </div>
    <div class="dock-content">
      <div class="slider-group">
        <div class="slider-label"><span>TEMP_TARGET</span><span id="lbl-temp-target">75°F</span></div>
        <input type="range" id="input-temp" min="65" max="88" value="75">
      </div>
      <div class="slider-group">
        <div class="slider-label"><span>RH_TARGET</span><span id="lbl-rh-target">55%</span></div>
        <input type="range" id="input-rh" min="35" max="75" value="55">
      </div>
      <div style="font-size:9px; font-family:'Orbitron'; color:#444; display:flex; justify-content:space-between; margin-top:10px;">
        <span>CO2: 1200PPM</span>
        <span>HVAC: <span style="color:var(--green)">OPTIMAL</span></span>
      </div>
    </div>
  </div>

  <div id="interact-hint" class="hint" style="display:none;">[E] ACCESS CORE TERMINAL</div>
</div>

<div id="tablet">
  <div class="tablet-header"><span>// NOYES_BOYS_SYSTEM_ACCESS</span><button onclick="toggleTablet()" style="background:none; border:none; color:#444; cursor:pointer; font-size:14px;">✕</button></div>
  <div class="tablet-body">
    <div class="tablet-nav">
      <button class="nav-btn active" onclick="setTab('dash', this)">DASHBOARD</button>
      <button class="nav-btn" onclick="setTab('market', this)">MARKET</button>
      <button class="nav-btn" onclick="setTab('genetics', this)">GENETICS</button>
      <div style="flex:1"></div>
      <button class="nav-btn" onclick="askAI()" style="color:var(--gold)">AI_CONSULTANT</button>
    </div>
    <div id="tablet-content" class="tablet-content"></div>
  </div>
</div>

<canvas id="stage"></canvas>

<script>
const apiKey = ""; 

const GS = {
  coins: 1500, xp: 450, totalG: 124.5,
  temp: 74.2, rh: 55, targetTemp: 75, targetRh: 55,
  playerPos: { x: 0, z: 3 }
};

// --- CINEMATIC 3D ENGINE ---
let scene = null;
let camera = null;
let renderer = null;
let player = null;
let clock = null;
const plants = [];

function init3D() {
  // Ensure THREE is defined before proceeding
  if (typeof THREE === 'undefined') {
    console.error("Three.js not loaded.");
    return;
  }

  clock = new THREE.Clock();
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x000000, 0.05);
  
  camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  
  const canvas = document.getElementById('stage');
  renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, powerPreference: "high-performance" });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  // Environment
  const roomGeo = new THREE.BoxGeometry(12, 7, 12);
  const roomMat = new THREE.MeshStandardMaterial({ 
    color: 0x222222, side: THREE.BackSide, 
    metalness: 0.95, roughness: 0.15 
  });
  const room = new THREE.Mesh(roomGeo, roomMat);
  room.receiveShadow = true;
  scene.add(room);

  // Grid
  const grid = new THREE.GridHelper(12, 24, 0x00ff00, 0x051505);
  grid.position.y = -3.49;
  grid.material.opacity = 0.2;
  grid.material.transparent = true;
  scene.add(grid);

  // Lighting
  const growLight = new THREE.PointLight(0xa855f7, 3, 18);
  growLight.position.set(0, 3, 0);
  growLight.castShadow = true;
  growLight.shadow.mapSize.width = 1024;
  growLight.shadow.mapSize.height = 1024;
  scene.add(growLight);

  const fillLight = new THREE.PointLight(0xfff4e0, 0.8, 15);
  fillLight.position.set(-3, 2, -3);
  scene.add(fillLight);

  // Volumetric
  const rayGeo = new THREE.CylinderGeometry(0, 5, 6, 32);
  const rayMat = new THREE.MeshBasicMaterial({ 
    color: 0xa855f7, transparent: true, opacity: 0.03, side: THREE.DoubleSide 
  });
  const rays = new THREE.Mesh(rayGeo, rayMat);
  rays.position.y = 0;
  scene.add(rays);

  // Player
  const playerGroup = new THREE.Group();
  const bodyGeo = new THREE.CapsuleGeometry(0.3, 1.2, 4, 8);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.1 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  playerGroup.add(body);
  
  const visorGeo = new THREE.BoxGeometry(0.4, 0.15, 0.3);
  const visorMat = new THREE.MeshBasicMaterial({ color: 0xfbbf24 });
  const visor = new THREE.Mesh(visorGeo, visorMat);
  visor.position.set(0, 0.6, 0.2);
  playerGroup.add(visor);
  
  player = playerGroup;
  player.position.y = -2.2;
  player.castShadow = true;
  scene.add(player);

  // Desk
  const deskGeo = new THREE.BoxGeometry(2, 0.1, 1);
  const desk = new THREE.Mesh(deskGeo, new THREE.MeshStandardMaterial({color: 0x0a0a0a}));
  desk.position.set(5, -2, 5);
  scene.add(desk);

  const screenGeo = new THREE.PlaneGeometry(1, 0.6);
  const screenMat = new THREE.MeshBasicMaterial({ color: 0x4ade80 });
  const screen = new THREE.Mesh(screenGeo, screenMat);
  screen.position.set(4.9, -1.3, 4.6);
  screen.rotation.y = Math.PI / 4;
  scene.add(screen);
  
  const sLight = new THREE.PointLight(0x4ade80, 1, 3);
  sLight.position.set(4.5, -1.3, 4.5);
  scene.add(sLight);

  for(let i=0; i<6; i++) {
    createHighResPlant((Math.random() - 0.5) * 6, (Math.random() - 0.5) * 6);
  }

  camera.position.set(0, 6, 10);
  
  document.getElementById('loader').style.display = 'none';
  animate();
}

function createHighResPlant(x, z) {
  if (!scene) return;
  const group = new THREE.Group();
  const pot = new THREE.Mesh(
    new THREE.CylinderGeometry(0.35, 0.25, 0.5, 24),
    new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.8 })
  );
  group.add(pot);

  const stalk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.03, 0.06, 1.5, 8),
    new THREE.MeshStandardMaterial({ color: 0x064e3b })
  );
  stalk.position.y = 0.75;
  group.add(stalk);

  for(let i=0; i<8; i++) {
    const leaf = new THREE.Mesh(
      new THREE.SphereGeometry(0.3, 8, 8),
      new THREE.MeshStandardMaterial({ color: 0x166534, roughness: 0.2 })
    );
    leaf.scale.set(1.5, 0.2, 1);
    leaf.position.y = 0.5 + (i * 0.15);
    leaf.rotation.y = (i * 45) * (Math.PI / 180);
    group.add(leaf);
  }

  group.position.set(x, -3.2, z);
  group.castShadow = true;
  scene.add(group);
  plants.push(group);
}

// --- LOGIC ---
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if(e.key.toLowerCase() === 'e' && nearPC()) toggleTablet();
});
window.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
});

function nearPC() {
  if (!player) return false;
  return player.position.distanceTo(new THREE.Vector3(5, -2, 5)) < 2;
}

function toggleTablet() {
  const t = document.getElementById('tablet');
  const showing = t.style.display === 'flex';
  t.style.display = showing ? 'none' : 'flex';
  if(!showing) setTab('dash', document.querySelector('.nav-btn'));
}

function setTab(tab, btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const content = document.getElementById('tablet-content');
  content.innerHTML = `<h2 style="color:var(--green); letter-spacing:2px;">INTERNAL_SYSTEMS: ${tab.toUpperCase()}</h2>
  <div style="margin-top:20px; border:1px solid #111; padding:20px; background:rgba(0,0,0,0.3)">
    <p>> Analyzing environmental variables...</p>
    <p>> Current Power Draw: 2.8kW</p>
    <p>> Ventilation: 85% capacity</p>
  </div>`;
}

async function askAI() {
  const content = document.getElementById('tablet-content');
  content.innerHTML = `<p style="color:var(--gold); animation: pulse 1s infinite">REACHING OUT TO NOYES_CORE...</p>`;
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ contents: [{ parts: [{ text: "Pretend you are a gritty professional grow facility AI. Give one high-level secret for maximizing terpene production." }] }] })
    });
    const data = await res.json();
    content.innerHTML = `<h3 style="color:var(--gold)">AI_ADVISORY</h3><div style="line-height:1.8; color:#eee">${data.candidates[0].content.parts[0].text}</div>`;
  } catch(e) { content.innerHTML = "<p>UPLINK_ERROR</p>"; }
}

function animate() {
  if (!clock || !player || !renderer || !scene || !camera) {
    requestAnimationFrame(animate);
    return;
  }
  requestAnimationFrame(animate);

  const delta = clock.getDelta();
  
  if(document.getElementById('tablet').style.display !== 'flex') {
    const speed = 4.5 * delta;
    if(keys['w']) player.position.z -= speed;
    if(keys['s']) player.position.z += speed;
    if(keys['a']) player.position.x -= speed;
    if(keys['d']) player.position.x += speed;
    
    if(keys['w'] || keys['s'] || keys['a'] || keys['d']) {
        const targetRot = Math.atan2(keys['d'] - keys['a'], keys['s'] - keys['w']);
        player.rotation.y = THREE.MathUtils.lerp(player.rotation.y, targetRot, 0.1);
    }
  }

  const idealOffset = new THREE.Vector3(player.position.x, player.position.y + 7, player.position.z + 9);
  camera.position.lerp(idealOffset, 0.05);
  camera.lookAt(player.position.x, player.position.y + 1, player.position.z);

  GS.temp += (GS.targetTemp - GS.temp) * 0.01;
  GS.rh += (GS.targetRh - GS.rh) * 0.01;

  document.getElementById('ui-coins').innerText = GS.coins.toLocaleString();
  document.getElementById('dock-summary').innerText = `${GS.temp.toFixed(1)}°F / ${Math.floor(GS.rh)}%`;
  const vpd = (1.1 + (GS.temp-75)*0.03).toFixed(2);
  document.getElementById('ui-vpd').innerText = vpd + ' kPa';
  document.getElementById('interact-hint').style.display = nearPC() ? 'block' : 'none';

  renderer.render(scene, camera);
}

document.getElementById('input-temp').oninput = e => { GS.targetTemp = parseInt(e.target.value); document.getElementById('lbl-temp-target').innerText = e.target.value + '°F'; };
document.getElementById('input-rh').oninput = e => { GS.targetRh = parseInt(e.target.value); document.getElementById('lbl-rh-target').innerText = e.target.value + '%'; };

// START AFTER LOAD
window.onload = () => {
    init3D();
};

// Safeguarded Resize Listener
window.addEventListener('resize', () => {
  if (camera && renderer) {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  }
});
</script>
</body>
</html>
